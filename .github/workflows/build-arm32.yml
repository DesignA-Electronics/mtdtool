name: Build ARM32 (musl)

on:
  push:
  pull_request:

jobs:
  build-arm32-musl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -LO https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          tar -xf zig-x86_64-linux-0.15.2.tar.xz
          ln -s "$PWD/zig-x86_64-linux-0.15.2/zig" /usr/local/bin/zig

      - name: Build mtdtool for ARM32 (musl)
        run: |
          make mtdtool \
            CC="zig cc -target arm-linux-musleabihf" \
            CLANG_FORMAT=true \
            CFLAGS="-Wall -O2 -pipe"

      - name: Verify target architecture
        run: file mtdtool

      - uses: actions/upload-artifact@v4
        with:
          name: mtdtool-arm32-musl
          path: mtdtool
